<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeDrop - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #17140F;
            --ink-soft: #57524A;
            --crimson: #C4123D;
            --crimson-dark: #8F0C2C;
            --crimson-tint: #FCE7EB;
            --line: #E9E3DB;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--ink);
            background: radial-gradient(ellipse 120% 80% at 50% -10%, #2A0812 0%, #4A0F1E 42%, #17070C 100%);
            position: relative;
            overflow: hidden;
        }

        /* floating blood-drop accents, same motif as the rest of the site */
        .drop {
            position: absolute;
            opacity: 0.14;
            animation: float 7s ease-in-out infinite;
            z-index: 0;
        }
        .drop svg { width: 100%; height: 100%; display: block; }
        .drop.d1 { top: 9%;  left: 7%;  width: 54px; animation-delay: 0s; }
        .drop.d2 { bottom: 12%; left: 11%; width: 32px; animation-delay: 1.2s; opacity: 0.10; }
        .drop.d3 { top: 14%; right: 9%;  width: 44px; animation-delay: 0.6s; }
        .drop.d4 { bottom: 9%;  right: 13%; width: 60px; animation-delay: 2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-16px) rotate(4deg); }
        }

        .register-container {
            background-color: #ffffff;
            width: 420px;
            max-width: 100%;
            padding: 42px 36px;
            border-radius: 20px;
            box-shadow: 0 30px 70px -20px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .logo-mark {
            width: 52px; height: 52px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--crimson), var(--crimson-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 10px 22px -8px rgba(196, 18, 61, 0.55);
        }

        .logo {
            font-family: 'Sora', sans-serif;
            color: var(--ink);
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
        }
        .subtitle {
            color: var(--ink-soft);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 12.5px;
            color: var(--ink-soft);
            margin-bottom: 7px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            opacity: 0.55;
            pointer-events: none;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 14px 12px 40px;
            border: 1.5px solid var(--line);
            border-radius: 10px;
            font-size: 15.5px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            background-color: #FCFBF9;
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
            appearance: none;
        }
        .input-group select {
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='9' viewBox='0 0 14 9'><path d='M1 1l6 6 6-6' stroke='%2357524A' stroke-width='1.6' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
            background-repeat: no-repeat;
            background-position: right 14px center;
            padding-right: 36px;
        }
        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--crimson);
            box-shadow: 0 0 0 3px var(--crimson-tint);
            background-color: #fff;
        }

        .register-btn {
            width: 100%;
            background-color: var(--crimson);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15.5px;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
            box-shadow: 0 12px 24px -10px rgba(196, 18, 61, 0.55);
        }
        .register-btn:hover { background-color: var(--crimson-dark); transform: translateY(-1px); }
        .register-btn:active { transform: translateY(0); }

        .switch-page {
            margin-top: 22px;
            font-size: 14px;
            color: var(--ink-soft);
        }
        .switch-page a {
            color: var(--crimson);
            text-decoration: none;
            font-weight: 700;
        }
        .switch-page a:hover { text-decoration: underline; }

        .back-home {
            display: inline-block;
            margin-top: 18px;
            font-size: 13px;
            color: var(--ink-soft);
            text-decoration: none;
        }
        .back-home:hover { color: var(--crimson); }
    </style>
</head>
<body>

    <div class="drop d1"><svg viewBox="0 0 24 24" fill="#FF5C7A"><path d="M12 2C12 2 5 11.5 5 16a7 7 0 0 0 14 0c0-4.5-7-14-7-14z"/></svg></div>
    <div class="drop d2"><svg viewBox="0 0 24 24" fill="#FF5C7A"><path d="M12 2C12 2 5 11.5 5 16a7 7 0 0 0 14 0c0-4.5-7-14-7-14z"/></svg></div>
    <div class="drop d3"><svg viewBox="0 0 24 24" fill="#FF5C7A"><path d="M12 2C12 2 5 11.5 5 16a7 7 0 0 0 14 0c0-4.5-7-14-7-14z"/></svg></div>
    <div class="drop d4"><svg viewBox="0 0 24 24" fill="#FF5C7A"><path d="M12 2C12 2 5 11.5 5 16a7 7 0 0 0 14 0c0-4.5-7-14-7-14z"/></svg></div>

    <div class="register-container">
        <div class="logo-mark">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 11.5 5 16a7 7 0 0 0 14 0c0-4.5-7-14-7-14z"/></svg>
        </div>
        <div class="logo">LifeDrop Droplet</div>
        <div class="subtitle">Create an account to join our network</div>

        <form action="register_process.php" method="POST">
            <div class="input-group">
                <label for="name">Full Name</label>
                <div class="input-wrap">
                    <span class="field-icon">🧑</span>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="input-group">
                <label for="phone">Phone Number</label>
                <div class="input-wrap">
                    <span class="field-icon">📱</span>
                    <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required>
                </div>
            </div>

            <div class="input-group">
                <label for="blood-group">Blood Group</label>
                <div class="input-wrap">
                    <span class="field-icon">🩸</span>
                    <select id="blood-group" name="blood_group" required>
                        <option value="">Select Blood Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <span class="field-icon">🔒</span>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
            </div>

            <button type="submit" class="register-btn">Register</button>
        </form>

        <div class="switch-page">
            Already have an account? <a href="login.html">Log in here</a>
        </div>

        <a href="index.php" class="back-home">← Back to home</a>
    </div>

</body>
</html>
